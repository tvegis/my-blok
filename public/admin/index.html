<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1a1a2e; }
    #login-box { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .login-card { text-align: center; padding: 2.5rem; }
    .login-card h1 { color: #e0e0e0; font-size: 1.5rem; font-weight: 600; margin-bottom: 0.5rem; }
    .login-card p { color: #888; font-size: 0.9rem; margin-bottom: 2rem; }
    .login-btn {
      padding: 0.75rem 2rem; font-size: 1rem; border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12); background: #2d2d5e;
      color: #fff; cursor: pointer; transition: background 0.2s;
    }
    .login-btn:hover { background: #3d3d7e; }
    .login-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    #error-box {
      display: none; margin-top: 1rem; padding: 0.75rem 1rem;
      background: rgba(255, 50, 50, 0.1); border: 1px solid rgba(255, 50, 50, 0.3);
      border-radius: 6px; color: #ff6b6b; font-size: 0.85rem;
    }
    #cms-root { min-height: 100vh; }
  </style>
</head>
<body>
  <div id="login-box">
    <div class="login-card">
      <h1>博客内容管理</h1>
      <p>使用 GitHub 账号登录以编辑文章</p>
      <button class="login-btn" id="login-btn">Login with GitHub</button>
      <div id="error-box"></div>
    </div>
  </div>
  <div id="cms-root" style="display:none;"></div>

  <script>
    var TOKEN_KEY = 'decap-cms-github-token';

    function showError(msg) {
      var box = document.getElementById('error-box');
      box.textContent = msg;
      box.style.display = 'block';
    }

    function login() {
      var btn = document.getElementById('login-btn');
      btn.disabled = true;
      btn.textContent = 'Logging in...';
      window.open('/api/auth', 'login', 'width=600,height=680');
      // Re-enable after timeout in case popup is blocked
      setTimeout(function() {
        btn.disabled = false;
        btn.textContent = 'Login with GitHub';
      }, 5000);
    }

    document.getElementById('login-btn').addEventListener('click', login);

    // Listen for OAuth token from callback popup
    window.addEventListener('message', function(e) {
      if (typeof e.data === 'string' && e.data.includes('authorization:github:success')) {
        try {
          var json = e.data.replace('authorization:github:success:', '');
          var data = JSON.parse(json);
          localStorage.setItem(TOKEN_KEY, data.token);
          loadCMS();
        } catch (err) {
          console.error('Auth error:', err);
          showError('Authentication failed. Please try again.');
          document.getElementById('login-btn').disabled = false;
          document.getElementById('login-btn').textContent = 'Login with GitHub';
        }
      }
    });

    function loadCMS() {
      // Hide login UI, show CMS container
      document.getElementById('login-box').style.display = 'none';
      document.getElementById('cms-root').style.display = 'block';

      // Dynamically load Decap CMS only after auth succeeds
      var script = document.createElement('script');
      script.src = 'https://unpkg.com/decap-cms@3.14.1/dist/decap-cms.js';
      script.onload = function() {
        try {
          window.CMS = window.DecapCms?.default || window.DecapCms;
          if (window.CMS && typeof window.CMS.init === 'function') {
            window.CMS.init();
          } else {
            showError('CMS library loaded but init function not found.');
          }
        } catch (err) {
          console.error('CMS init error:', err);
          document.getElementById('cms-root').innerHTML =
            '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:#fff;text-align:center;padding:2rem;">' +
            '<div><h1>Failed to initialize CMS</h1>' +
            '<p style="color:#999;margin:1rem 0;">Please try refreshing the page.</p>' +
            '<button onclick="location.reload()" style="padding:0.6rem 1.5rem;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:#fff;cursor:pointer;">Reload</button></div></div>';
        }
      };
      script.onerror = function() {
        document.getElementById('cms-root').innerHTML =
          '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;color:#fff;text-align:center;padding:2rem;">' +
          '<div><h1>Failed to load CMS</h1>' +
          '<p style="color:#999;margin:1rem 0;">Check your network connection and try again.</p>' +
          '<button onclick="location.reload()" style="padding:0.6rem 1.5rem;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.05);color:#fff;cursor:pointer;">Retry</button></div></div>';
      };
      document.head.appendChild(script);
    }

    // If already authenticated (e.g., after page refresh), load CMS directly
    if (localStorage.getItem(TOKEN_KEY)) {
      loadCMS();
    }
  </script>
</body>
</html>
